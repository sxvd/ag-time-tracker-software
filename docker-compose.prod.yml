services:
  postgres:
    image: postgres:16-bookworm
    container_name: aq-time-tracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ag_time_tracker}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-ag_time_tracker}"]
      interval: 10s
      timeout: 5s
      retries: 12

  web:
    build:
      context: .
      target: runner
    image: ag-time-tracker:${IMAGE_TAG:-local}
    container_name: aq-time-tracker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-ag_time_tracker}?schema=public
      NUXT_SESSION_PASSWORD: ${NUXT_SESSION_PASSWORD:?NUXT_SESSION_PASSWORD is required}
      NUXT_AI_INSIGHTS_API_KEY: ${NUXT_AI_INSIGHTS_API_KEY:-}
      NITRO_HOST: 0.0.0.0
      PORT: 5500
      NUXT_APP_BASE_URL: /tracker/
    ports:
      - "5500:5500"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:5500/aq-time-tracker/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      default:
      app-network:
        aliases:
          - tracker

  migrate:
    build:
      context: .
      target: runner
    image: ag-time-tracker:${IMAGE_TAG:-local}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-ag_time_tracker}?schema=public
    command: ["npx", "prisma", "migrate", "deploy", "--schema=backend/prisma/schema.prisma"]
    profiles:
      - tools

networks:
  app-network:
    external: true
    name: app-network

volumes:
  postgres_data:
